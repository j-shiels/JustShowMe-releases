name: Feature request
description: Suggest an idea or improvement for JustShowMe Desktop.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Search existing issues first — if your idea is already
        there, give it a 👍 instead of opening a duplicate.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that JustShowMe makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
    validations:
      required: false
